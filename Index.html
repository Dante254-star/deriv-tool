<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Matches Tool</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #0b1a2a;
    color: white;
    text-align: center;
}

.container {
    max-width: 500px;
    margin: auto;
}

.title {
    font-size: 28px;
    margin: 20px 0;
    color: #00d4ff;
}

.card {
    background: #132c46;
    padding: 20px;
    margin: 15px 0;
    border-radius: 15px;
}

.circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(45deg, #ff00cc, #3333ff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    margin: 15px auto;
}

.confidence {
    color: #ffd700;
    font-size: 18px;
}

button {
    background: green;
    color: white;
    border: none;
    padding: 10px 20px;
    margin-top: 10px;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <div class="title">Matches Tool</div>

    <div id="cards"></div>
</div>

<script>
const symbols = [
    "R_10_1S",
    "R_25_1S",
    "R_50_1S",
    "R_75_1S",
    "R_100_1S"
];

let digitStats = {};

symbols.forEach(sym => {
    digitStats[sym] = Array(10).fill(0);
});

const ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=1089");

ws.onopen = () => {
    symbols.forEach(sym => {
        ws.send(JSON.stringify({
            ticks: sym,
            subscribe: 1
        }));
    });
};

ws.onmessage = (msg) => {
    let data = JSON.parse(msg.data);

    if (data.tick) {
        let sym = data.tick.symbol;
        let price = data.tick.quote.toString();
        let lastDigit = parseInt(price[price.length - 1]);

        digitStats[sym][lastDigit]++;

        updateUI();
    }
};

function getPrediction(stats) {
    let max = Math.max(...stats);
    let digit = stats.indexOf(max);
    let total = stats.reduce((a,b)=>a+b,0);

    let confidence = total ? Math.floor((max/total)*100) : 0;

    return {digit, confidence};
}

function updateUI() {
    let html = "";

    symbols.forEach(sym => {
        let stats = digitStats[sym];
        let {digit, confidence} = getPrediction(stats);

        html += `
        <div class="card">
            <h3>${sym.replace("_1S"," (1s)").replace("R_","Volatility ")}</h3>

            <div class="circle">${digit}</div>

            <div class="confidence">Confidence: ${confidence}%</div>

            <button onclick="alert('Trade ${digit}')">TRADE NOW</button>
        </div>
        `;
    });

    document.getElementById("cards").innerHTML = html;
}
</script>

</body>
</html>
