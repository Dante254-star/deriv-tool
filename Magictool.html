<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matches Vision</title>
<style>
*{box-sizing:border-box}
body{
  background:#0A0E1A;
  color:#E8EAED;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  padding:16px;
  margin:0
}
.header{
  color:#3DBBFF;
  font-size:20px;
  font-weight:700;
  margin-bottom:24px
}
.tabs{
  display:flex;
  gap:12px;
  margin-bottom:24px
}
.tab{
  flex:1;
  padding:12px;
  border-radius:12px;
  text-align:center;
  background:#131722;
  border:1px solid #1E2230;
  font-size:14px;
  font-weight:500;
  cursor:pointer
}
.tab.active{
  background:#3DBBFF;
  color:#0A0E1A;
  border-color:#3DBBFF;
  font-weight:600
}
.desc{
  text-align:center;
  margin-bottom:28px
}
.desc h1{
  color:#3DBBFF;
  font-size:26px;
  font-weight:700;
  margin:0 0 8px 0
}
.desc p{
  color:#8B92A7;
  margin:0;
  font-size:14px;
  line-height:1.5
}
.card{
  background:#131722;
  border:1px solid #1E2230;
  border-radius:18px;
  padding:28px 20px;
  margin-bottom:16px;
  text-align:center
}
.card-title{
  color:#3DBBFF;
  font-size:16px;
  font-weight:600;
  margin-bottom:20px
}
.circle{
  width:120px;
  height:120px;
  border-radius:50%;
  margin:0 auto 16px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:48px;
  font-weight:700;
  color:#FFF
}
.countdown{
  background:#1A1F2E;
  border:2px solid #2A3142
}
.blue{
  background:linear-gradient(135deg,#2B9DFF,#1A7FFF);
  box-shadow:0 8px 24px rgba(43,157,255,0.3)
}
.pink{
  background:linear-gradient(135deg,#C84FD8,#8B4FD8);
  box-shadow:0 8px 24px rgba(200,79,216,0.3)
}
.even{
  background:linear-gradient(135deg,#00D9A5,#00B894);
  box-shadow:0 8px 24px rgba(0,217,165,0.3)
}
.odd{
  background:linear-gradient(135deg,#FF6B35,#FF5722);
  box-shadow:0 8px 24px rgba(255,107,53,0.3)
}
.over{
  background:linear-gradient(135deg,#FFB800,#FF8C00);
  box-shadow:0 8px 24px rgba(255,184,0,0.3)
}
.under{
  background:linear-gradient(135deg,#8B5CF6,#7C3AED);
  box-shadow:0 8px 24px rgba(139,92,246,0.3)
}
.confidence{
  color:#FFB800;
  font-size:15px;
  font-weight:600;
  margin-bottom:6px;
  min-height:20px
}
.entry{
  color:#3DBBFF;
  font-size:15px;
  font-weight:600;
  min-height:20px
}
.alert{
  color:#00FF88;
  font-size:17px;
  font-weight:700;
  margin-top:10px;
  min-height:22px
}
.ticks{
  font-size:11px;
  color:#5A6275;
  margin-top:8px
}
</style>
</head>
<body>
<div class="header">Matches Vision</div>

<div class="tabs">
  <div class="tab active" id="matchesTab">Matches</div>
  <div class="tab" id="evenOddTab">Even/Odd</div>
  <div class="tab" id="overUnderTab">Over/Under</div>
</div>

<div class="desc" id="desc">
  <h1>Matches Tool</h1>
  <p>Predicts <b>most frequent digit</b> every 15s<br>for multiple <span style="color:#3DBBFF">volatility indices</span></p>
</div>

<div id="container"></div>

<script>
window.onload = function() {
  const markets = [
    {symbol:"R_10", name:"Volatility 10 (1s) Index", color:"blue"},
    {symbol:"R_10_1HZ", name:"Volatility 10 Index", color:"pink"},
    {symbol:"R_25", name:"Volatility 25 (1s) Index", color:"blue"},
    {symbol:"R_25_1HZ", name:"Volatility 25 Index", color:"pink"},
    {symbol:"R_50", name:"Volatility 50 (1s) Index", color:"blue"},
    {symbol:"R_50_1HZ", name:"Volatility 50 Index", color:"pink"},
    {symbol:"R_75", name:"Volatility 75 (1s) Index", color:"blue"},
    {symbol:"R_75_1HZ", name:"Volatility 75 Index", color:"pink"},
    {symbol:"R_100", name:"Volatility 100 (1s) Index", color:"blue"},
    {symbol:"R_100_1HZ", name:"Volatility 100 Index", color:"pink"}
  ];
  
  const container = document.getElementById("container");
  let currentMode = 'matches';
  let data = {};

  document.getElementById("matchesTab").onclick = () => switchMode('matches');
  document.getElementById("evenOddTab").onclick = () => switchMode('evenodd');
  document.getElementById("overUnderTab").onclick = () => switchMode('overunder');

  function switchMode(mode){
    currentMode = mode;
    document.querySelectorAll('.tab').forEach(t=>t.className='tab');
    document.getElementById(mode==='matches'?'matchesTab':mode==='evenodd'?'evenOddTab':'overUnderTab').className='tab active';
    
    let titles = {
      matches: `<h1>Matches Tool</h1><p>Predicts <b>most frequent digit</b> every 15s<br>for multiple <span style="color:#3DBBFF">volatility indices</span></p>`,
      evenodd: `<h1>Even / Odd Tool</h1><p>Predicts <b>Even vs Odd</b> every 15s<br>for multiple <span style="color:#3DBBFF">volatility indices</span></p>`,
      overunder: `<h1>Over / Under Tool</h1><p>Predicts <b>Over 3 vs Under 7</b> every 15s<br>for multiple <span style="color:#3DBBFF">volatility indices</span></p>`
    };
    document.getElementById("desc").innerHTML = titles;
    
    markets.forEach(m => {
      data[m.symbol].phase = 1;
      data[m.symbol].timer = 15;
    });
  }

  markets.forEach((m, index) => {
    data[m.symbol] = {
      history:[],
      phase:1,
      timer:15,
      display:{digit:'-',conf:'',cls:'',entryText:'Next prediction in'}
    };
    
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div class="card-title">${m.name}</div>
      <div class="circle countdown" id="${m.symbol}_circle">15s</div>
      <div class="confidence" id="${m.symbol}_conf"></div>
      <div class="entry" id="${m.symbol}_entry">Next prediction in</div>
      <div class="alert" id="${m.symbol}_alert"></div>
      <div class="ticks" id="${m.symbol}_ticks">Ticks: 0</div>
    `;
    container.appendChild(div);

    setInterval(()=>{
      let d = data[m.symbol];
      let circle = document.getElementById(m.symbol+"_circle");
      let conf = document.getElementById(m.symbol+"_conf");
      let entry = document.getElementById(m.symbol+"_entry");
      let alert = document.getElementById(m.symbol+"_alert");
      let ticks = document.getElementById(m.symbol+"_ticks");
      
      d.timer--;
      ticks.innerText = `Ticks: ${d.history.length}`;
      
      if(d.phase === 1){
        circle.className = 'circle countdown';
        circle.innerText = d.timer+'s';
        entry.innerText = 'Next prediction in';
        conf.innerText = '';
        alert.innerText = '';
        
        if(d.timer <= 0){
          let h = d.history.slice(-100);
          
          if(h.length > 0){
            if(currentMode === 'matches'){
              let counts = Array(10).fill(0);
              h.forEach(x=>counts[x]++);
              let max = Math.max(...counts);
              d.display.digit = counts.indexOf(max);
              d.display.cls = m.color;
              d.display.conf = `Confidence: ${Math.round(max/h.length*100)}%`;
              
            } else if(currentMode === 'evenodd'){
              let e = h.filter(x=>x%2===0).length;
              let o = h.length - e;
              let isE = e >= o;
              d.display.digit = isE? 'E' : 'O';
              d.display.cls = isE? 'even' : 'odd';
              d.display.conf = `${isE?'EVEN':'ODD'}: ${Math.round(Math.max(e,o)/h.length*100)}%`;
              
            } else {
              let over = h.filter(x=>x>=4).length; // Over 3
              let under = h.filter(x=>x<=6).length; // Under 7
              let isO = over >= under;
              d.display.digit = isO? 'O' : 'U';
              d.display.cls = isO? 'over' : 'under';
              d.display.conf = `${isO?'OVER 3':'UNDER 7'}: ${Math.round(Math.max(over,under)/h.length*100)}%`;
            }
          } else {
            d.display.digit = '-';
            d.display.cls = m.color;
            d.display.conf = 'No data';
          }
          
          d.phase = 2;
          d.timer = 5;
          d.display.entryText = `Entry in ${d.timer}s`;
        }
        
      } else {
        // PHASE 2: ALWAYS SHOW SAVED DATA
        circle.className = `circle ${d.display.cls}`;
        circle.innerText = d.display.digit;
        conf.innerText = d.display.conf; // CONFIDENCE STAYS VISIBLE
        entry.innerText = `Entry in ${d.timer}s`;
        alert.innerText = '';
        
        if(d.timer <= 0){
          alert.innerText = 'TRADE NOW';
          entry.innerText = 'Execute trade';
          
          setTimeout(() => {
            d.phase = 1;
            d.timer = 15;
            d.history = [];
          }, 2000);
        }
      }
    },1000);

    setTimeout(() => {
      let ws=new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
      ws.onopen=()=>ws.send(JSON.stringify({ticks:m.symbol,subscribe:1}));
      ws.onmessage=e=>{
        let res=JSON.parse(e.data);
        if(res.tick){
          let last=parseInt(res.tick.pip);
          data[m.symbol].history.push(last);
          if(data[m.symbol].history.length > 100) data[m.symbol].history.shift();
        }
      };
    }, index * 500);
  });
};
</script>
</body>
</html>
